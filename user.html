<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Portal Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body class="user-theme">
    
    <div class="d-flex flex-column vh-100" id="wrapper">
        <div class="d-flex flex-grow-1 overflow-hidden">
            <div class="sidebar border-end bg-light p-3 d-flex flex-column justify-content-between">
                <div>
                    <div class="logo h4 fw-bold mb-4 px-2 text-primary-emphasis">stack-underflow</div>
                    <div class="list-group list-group-flush bg-transparent">
                        <a href="user.html" class="list-group-item list-group-item-action bg-transparent active fw-bold">Mis Tickets</a>
                        <a href="knowledge-base.html" class="list-group-item list-group-item-action bg-transparent">Base de Conocimiento</a>
                    </div>
                </div>
                <div class="px-2">
                    <div class="small mb-2">Perfil: <strong>Usuario</strong></div>
                    <a href="index.html" class="text-danger text-decoration-none fw-bold">Cerrar Sesion</a>
                </div>
            </div>

            <div class="container-fluid p-0 d-flex flex-column main-content overflow-auto">
                <div class="p-5 flex-grow-1">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary-subtle">
                        <h1 class="h3 m-0">Mis Solicitudes</h1>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-8">
                            <div class="card rounded-0 border-secondary-subtle shadow-sm">
                                <div class="card-header bg-light border-bottom border-secondary-subtle fw-bold rounded-0">
                                    Levantar Incidencia
                                </div>
                                <div class="card-body">
                                    <form action="#">
                                        <div class="mb-3">
                                            <label class="form-label small text-muted">Asunto</label>
                                            <input type="text" class="form-control rounded-0" value="">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label small text-muted">Categor&iacute;a</label>
                                            <select class="form-select rounded-0">
                                                <option>Hardware</option>
                                                <option>Software</option>
                                                <option>Redes</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label small text-muted">Descripci&oacute;n</label>
                                            <textarea class="form-control rounded-0" rows="3" cols="50"></textarea>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button type="button" class="btn btn-primary rounded-0 px-4">Enviar</button>
                                            <button type="button" class="btn btn-outline-secondary rounded-0 px-4">Cancelar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card h-100 rounded-0 border-secondary-subtle bg-light text-center shadow-sm d-flex justify-content-center align-items-center">
                                <div>
                                    <h3 class="text-muted small fw-bold text-uppercase mb-2">Tickets Activos</h3>
                                    <div class="display-1 fw-bold text-primary-emphasis">2</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card rounded-0 border-secondary-subtle shadow-sm">
                        <div class="card-header bg-light border-bottom border-secondary-subtle fw-bold rounded-0">
                            Historial
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Asunto</th>
                                        <th>Fecha</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="ps-4 font-monospace text-muted">#TK-1001</td>
                                        <td>Reporte t&eacute;cnico</td>
                                        <td>Hoy</td>
                                        <td><span class="badge rounded-0 bg-danger-subtle text-danger border border-danger-subtle">Abierto</span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="py-3 text-center w-100 border-top border-secondary-subtle bg-white">
                    <div class="container small text-muted">
                        <p class="m-0">&copy; 2026 stack-underflow System.</p>
                        <div class="mt-2 w3c-badges">
                            <a href="https://validator.w3.org/check?uri=referer">
                                <img src="https://www.w3.org/Icons/valid-html401" alt="Valid HTML 4.01 Transitional" height="31" width="88">
                            </a>
                                    
                            <a href="https://jigsaw.w3.org/css-validator/check/referer">
                                <img src="https://jigsaw.w3.org/css-validator/images/vcss-blue" alt="CSS Valido!" height="31" width="88">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</body>
</html>
