<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100 bg-light">
    
    <div class="login-box p-5 shadow-sm bg-white mb-auto mt-auto">
        <h3 class="text-center mb-3 fw-bold">Recuperar Acceso</h3>
        <p class="text-muted small text-center mb-4">Ingresa tus datos para recibir un enlace de restablecimiento.</p>
        
        <form id="recoverForm">
            <div class="mb-3">
                <label for="employeeId" class="form-label small fw-bold text-uppercase">ID de Empleado / Matrícula</label>
                <input type="text" id="employeeId" class="form-control" placeholder="Ej. 12345" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold text-uppercase">Correo Corporativo</label>
                <input type="email" id="email" class="form-control" placeholder="usuario@empresa.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-0 mb-2">ENVIAR ENLACE</button>
            <a href="index.html" class="btn btn-outline-secondary w-100 py-2 rounded-0">VOLVER AL LOGIN</a>
        </form>
    </div>

    <footer class="py-3 mt-auto text-center w-100 border-top border-secondary-subtle bg-white">
        <div class="container small text-muted">
            <p class="m-0">&copy; 2026 HelpDesk System. Todos los derechos reservados.</p>
            <div class="mt-2">
                <a href="#" class="text-decoration-none text-secondary border border-secondary px-2 py-1 rounded-0" style="font-size: 0.75rem;">
                    W3C HTML 4.01
                </a>
                <a href="#" class="text-decoration-none text-secondary border border-secondary px-2 py-1 rounded-0 ms-2" style="font-size: 0.75rem;">
                    W3C CSS
                </a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('recoverForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Si los datos son correctos, recibirás un correo en los próximos minutos.");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
