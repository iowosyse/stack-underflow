<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Login - stack-underflow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body class="bg-light">
    
    <div class="d-flex flex-column align-items-center justify-content-center vh-100">
        <div class="login-box p-5 shadow-sm bg-white mb-auto mt-auto">
            <h2 class="text-center mb-4 fw-bold">stack-underflow</h2>
            <form id="loginForm" action="#">
                <div class="mb-3">
                    <label for="user" class="form-label small text-muted">Usuario</label>
                    <input type="text" id="user" class="form-control" value="">
                </div>
                <div class="mb-3">
                    <label for="pass" class="form-label small text-muted">Contrase&ntilde;a</label>
                    <input type="password" id="pass" class="form-control" value="">
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 rounded-0">INGRESAR</button>
            </form>
            <div class="mt-3 text-center text-muted small">
                <p class="mb-1">Pistas: admin/admin o root/root</p>
                <a href="forgot-password.html" class="text-danger text-decoration-none">Olvid&eacute; mi contrase&ntilde;a</a>
            </div>
        </div>

        <div class="py-3 mt-auto text-center w-100 border-top border-secondary-subtle bg-white">
            <div class="container small text-muted">
                <p class="m-0">&copy; 2026 stack-underflow. Todos los derechos reservados.</p>
                <div class="mt-2 w3c-badges">
                    <a href="https://validator.w3.org/check?uri=referer">
                        <img src="https://www.w3.org/Icons/valid-html401" alt="Valid HTML 4.01 Transitional" height="31" width="88">
                    </a>
                            
                    <a href="https://jigsaw.w3.org/css-validator/check/referer">
                        <img src="https://jigsaw.w3.org/css-validator/images/vcss-blue" alt="CSS Valido!" height="31" width="88">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;

            if (u === 'admin' && p === 'admin') {
                window.location.href = 'admin.html';
            } else if (u === 'root' && p === 'root') {
                window.location.href = 'user.html';
            } else {
                alert("Credenciales incorrectas");
            }
        });
    </script>
</body>
</html>
